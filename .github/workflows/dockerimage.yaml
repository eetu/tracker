name: Create and publish Docker image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect build-relevant changes
        id: filter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'frontend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/dockerimage.yaml'

      - name: Decide whether to build
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] \
             || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.gate.outputs.backend == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: "arm64"

      - name: Set up Docker Buildx
        if: steps.gate.outputs.backend == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to the Container registry
        if: steps.gate.outputs.backend == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta_backend
        if: steps.gate.outputs.backend == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push backend image
        if: steps.gate.outputs.backend == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          platforms: linux/arm64
          # Skip provenance + SBOM attestations: each one becomes its own GHCR
          # "version", inflating the package version count for no benefit on a
          # single-platform image.
          provenance: false
          sbom: false

      - name: Prune untagged image versions
        if: steps.gate.outputs.backend == 'true'
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: tracker
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 5
